<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 &mdash; gaylab</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="scanlines" aria-hidden="true"></div>
  <main class="wrap center-page">
    <section class="term" style="max-width:520px;width:100%">
      <div class="term-bar" aria-hidden="true">
        <span class="dot d-r"></span><span class="dot d-y"></span><span class="dot d-g"></span>
        <span class="term-title">error</span>
      </div>
      <div class="term-body">
        <p class="line"><span class="pr">$</span> cat page</p>
        <h1 class="wordmark" style="font-size:clamp(2.4rem,10vw,4rem)">4<span class="grad">0</span>4</h1>
        <p class="tag">no such file or directory.</p>
        <p><a class="btn" href="/">cd ~ &rarr;</a></p>
      </div>
    </section>
  </main>
</body>
</html>
